name: Add native binaries to release

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      matrix:
        os: [ macos, windows ]
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Install dependencies
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install libpcap
        shell: bash
      - name: Add msbuild to PATH
        if: matrix.os == 'windows'
        uses: microsoft/setup-msbuild@v2
      - name: Install node-gyp
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global node-gyp@latest
      - name: Dependencies
        run: |
          npm ci --ignore-scripts
      - name: Build
        # npm cache clean to workaround ECOMPROMISED error on Windows
        run: |
          npm cache clean --force
          npm run prebuild
      - name: Upload prebuild artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/
          if-no-files-found: error
          retention-days: 1

  prebuild-linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
        os: [ debian, alpine ]
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Build
        run: |
          docker build . -f Dockerfile.${{ matrix.os }} --output prebuilds
      - name: Upload prebuild artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish
    needs: [ prebuild, prebuild-linux ]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'
      - name: Download prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          path: prebuilds
          merge-multiple: true
      - name: Publish
        run: npm publish --access public

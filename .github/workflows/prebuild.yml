name: Add native binaries to release

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      matrix:
        os: [ macos, windows ]
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install libpcap
        shell: bash
      - name: Add msbuild to PATH
        if: matrix.os == 'windows'
        uses: microsoft/setup-msbuild@v2
      - name: Install node-gyp
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global node-gyp@latest
      - name: Dependencies
        run: |
          npm ci --ignore-scripts
      - name: Build
        # npm cache clean to workaround ECOMPROMISED error on Windows
        run: |
          npm cache clean --force
          npx -y @audc/prebuild
      - name: Upload
        run: |
          npx -y @audc/prebuild --upload-all ${{ secrets.UPLOAD_TOKEN }}
        env:
          MAKEFLAGS: -j4
      - name: Publish
        if: matrix.os == 'macos'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  prebuild-linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
        os: [ debian, alpine ]
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Build
        run: |
          docker build . -f Dockerfile.${{ matrix.os }} --output prebuilds
      - name: Upload
        run: |
          npx -y @audc/prebuild --upload-all ${{ secrets.UPLOAD_TOKEN }}
